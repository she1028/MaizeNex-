<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MAIZENEX</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg fixed-top border-bottom bg-white">
        <div class="container-fluid px-4 d-flex align-items-center justify-content-between">

            <a class="navbar-brand d-flex align-items-center gap-2" href="#">
                <img src="images/maizenex logo.png" width="40">
                <span class="text-success fw-bold">MaizeNex</span>
            </a>

            <div class="collapse navbar-collapse justify-content-center">
                <ul class="navbar-nav text-center">
                    <li class="nav-item"><a class="nav-link px-3 text-secondary" href="#">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link px-3 text-secondary" href="#scanner">Scanner</a></li>
                </ul>
            </div>

            <div class="d-flex align-items-center gap-3">
                <i class="bi bi-bell text-secondary fs-5"></i>
                <img src="images/profile.png" class="rounded-circle" width="35">
            </div>
        </div>
    </nav>

    <!-- CAMERA SECTION -->
    <section id="scanner" class="container text-center" style="margin-top:100px;">
        <h3 class="mb-3">Camera Scanner</h3>

        <video id="camera" autoplay playsinline class="border rounded w-100" style="max-height:400px;"></video>

        <div class="mt-3">
            <button class="btn btn-success" onclick="openCamera()">Open Camera</button>
        </div>
    </section>

    <!-- SCRIPT -->
    <script>
        async function openCamera() {
            try {
                const video = document.getElementById('camera');

                const stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: { exact: "environment" } // rear camera for mobile
                    },
                    audio: false
                });

                video.srcObject = stream;

            } catch (error) {
                console.log("Rear camera not available, switching to default");

                // fallback camera
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({
                        video: true,
                        audio: false
                    });
                    document.getElementById('camera').srcObject = stream;
                } catch (err) {
                    alert("Camera not supported or permission denied.");
                }
            }
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
