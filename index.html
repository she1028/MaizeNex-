    <!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MAIZENEX</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg fixed-top border-bottom bg-white">
        <div class="container-fluid px-4 d-flex align-items-center justify-content-between">

            <!-- LEFT -->
            <a class="navbar-brand d-flex align-items-center gap-2" href="#">
                <img src="images/maizenex logo.png" width="40">
                <span class="text-success fw-bold">MaizeNex</span>
            </a>

            <!-- CENTER -->
            <div class="collapse navbar-collapse justify-content-center" id="navbarNav">
                <ul class="navbar-nav text-center">
                    <li class="nav-item"><a class="nav-link px-3 text-secondary" href="#">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link px-3 text-secondary" href="#scanner">Scanner</a></li>
                    <li class="nav-item"><a class="nav-link px-3 text-secondary" href="#">Community</a></li>
                    <li class="nav-item"><a class="nav-link px-3 text-secondary" href="#">Recommendations</a></li>
                </ul>
            </div>

            <!-- RIGHT -->
            <div class="d-flex align-items-center gap-3">
                <i class="bi bi-bell text-secondary fs-5"></i>
                <img src="images/profile.png" class="rounded-circle" width="35">
            </div>

            <!-- TOGGLER -->
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
        </div>
    </nav>

    <!-- CAMERA SECTION -->
    <section id="scanner" class="container text-center" style="margin-top:100px;">
        <h3 class="mb-3">Camera Scanner</h3>

        <!-- Video -->
        <video id="camera" width="100%" height="300" autoplay playsinline class="border rounded"></video>

        <!-- Button -->
        <div class="mt-3">
            <button class="btn btn-success" onclick="openCamera()">Open Camera</button>
        </div>
    </section>

    <!-- SCRIPT (INLINE) -->
    <script>
        async function openCamera() {
            try {
                const video = document.getElementById('camera');

                const stream = await navigator.mediaDevices.getUserMedia({
                    video: true,
                    audio: false
                });

                video.srcObject = stream;
            } catch (error) {
                console.error(error);
                alert("Camera access denied or not supported.");
            }
        }
    </script>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
